name: JAL compiling/execution test
on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-compiler:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Free gradlew
        run: chmod +x ./gradlew
      - name: Build distribution
        run: ./gradlew :jalc:build :jalp:build createDistribution
      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: langjal-distribution
          path: build/distributions/langjal-*.zip
  test-examples:
    name: Test Example - ${{ matrix.example }}
    runs-on: ubuntu-latest
    needs: build-compiler
    strategy:
      matrix:
        example: [
          HelloWorld2,
          FizzBuzz,
          OutputRedirect,
          SwitchExample,
          VariablesControl,
          ArithmeticOps,
          ArraysAndLoops,
          ObjectAndStringBuilder,
          TryCatchFinally,
        ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: langjal-distribution
          path: dist

      - name: Extract distribution
        run: |
          unzip dist/langjal-*.zip -d dist/langjal
          chmod +x dist/langjal/bin/jalc.sh

      - name: Compile ${{ matrix.example }}.jal
        run: |
          cd examples
          ../dist/langjal/bin/jalc.sh "${{ matrix.example }}.jal" --output outputs

          class_file=$(find outputs -name '*.class' | head -n1)
          if [ -z "$class_file" ]; then
            echo "No .class file found"
            exit 1
          fi
          # Save class name to a temp file
          basename "$class_file" .class > class_name.txt

      - name: Run ${{ matrix.example }}.class
        run: |
          cd examples
          class_name=$(cat class_name.txt)
          output=$(java -cp outputs "$class_name")
          echo "$output" > actual_output.txt

      - name: Compare output for ${{ matrix.example }}
        run: |
          cd examples
          # 出力と期待値を trim（末尾改行を削除）
          actual=$(< actual_output.txt tr -d '\n')
          expected=$(< outs/${{ matrix.example }}.out.txt tr -d '\n')

          if [ "$actual" != "$expected" ]; then
            echo "❌ Output mismatch for ${{ matrix.example }}"
            echo -e "\033[31mExpected:\033[0m"
            echo "$expected"
            echo -e "\033[31mGot:\033[0m"
            echo "$actual"
            exit 1
          else
            echo "✅ ${{ matrix.example }} passed"
          fi
